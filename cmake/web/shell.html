<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Glyph</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    #canvas {
      display: block;
      /* SDL3 callback mode resizes the canvas itself; we just centre it. */
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Loading overlay — fades out once the Module fires setStatus('') */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem;
      background: #111;
      color: #ccc;
      font-size: 0.9rem;
      transition: opacity 0.4s ease;
      z-index: 10;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    #spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status { letter-spacing: 0.04em; }

    #progress {
      width: 160px; height: 3px;
      appearance: none;
      background: #333; border: none; border-radius: 2px;
    }
    #progress::-webkit-progress-bar   { background: #333; border-radius: 2px; }
    #progress::-webkit-progress-value { background: #888; border-radius: 2px; }
    #progress::-moz-progress-bar      { background: #888; border-radius: 2px; }
    #progress[hidden] { display: none; }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <div id="overlay">
    <div id="spinner"></div>
    <div id="status">Loading…</div>
    <progress id="progress" value="0" max="100" hidden></progress>
  </div>

  <script>
    var statusEl   = document.getElementById('status');
    var progressEl = document.getElementById('progress');
    var overlayEl  = document.getElementById('overlay');
    var canvasEl   = document.getElementById('canvas');

    canvasEl.addEventListener('webglcontextlost', (e) => {
      alert('WebGL context lost — please reload.');
      e.preventDefault();
    }, false);

    function setStatus(text) {
      if (!setStatus._last) setStatus._last = { time: Date.now(), text: '' };
      if (text === setStatus._last.text) return;
      var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
      var now = Date.now();
      if (m && now - setStatus._last.time < 30) return;
      setStatus._last.time = now;
      setStatus._last.text = text;
      if (m) {
        statusEl.textContent = m[1].trim();
        progressEl.value     = parseInt(m[2]) * 100;
        progressEl.max       = parseInt(m[4]) * 100;
        progressEl.hidden    = false;
      } else {
        progressEl.hidden = true;
        if (!text) {
          overlayEl.classList.add('hidden');
          // remove from DOM after transition so it can't intercept pointer events
          overlayEl.addEventListener('transitionend', () => overlayEl.remove(), { once: true });
        } else {
          statusEl.textContent = text;
        }
      }
    }

    var Module = {
      canvas: canvasEl,
      setStatus: setStatus,
      totalDependencies: 0,
      monitorRunDependencies(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        setStatus(left
          ? 'Preparing… (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'All downloads complete.');
      },
      print(...args)    { console.log(...args); },
      printErr(...args) { console.error(...args); },
    };

    setStatus('Downloading…');

    window.onerror = (msg, src, line, col, err) => {
      setStatus('Error: ' + (err ? err.message : msg));
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
