site_name: Glyph Engine
site_url: https://jmit-dev.github.io/glyph
site_description: A code-first, cross-platform 2D game engine. C++17 core, Lua scripting.
repo_url: https://github.com/JMit-dev/glyph
repo_name: JMit-dev/glyph
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - Overview: api/index.md
      - Game & Lifecycle: api/game.md
      - Renderer: api/renderer.md
      - Camera: api/camera.md
      - Input: api/input.md
      - Texture: api/texture.md
      - Resources: api/resources.md
      - Math Types: api/math.md
  - Development:
      - Build Progress: dev/progress.md
      - C++ Conventions: dev/conventions.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JMit-dev/glyph
